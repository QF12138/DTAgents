id: T-MA-13
name: "L3-长大隧道综合地质建模完整工作流"
agent: multi_agent
level: L3
prompt: "对某长大隧道DK5+000至DK8+000里程段进行综合地质数字孪生建模：1)加载多源探测数据（TSP、GPR、钻孔）2)进行坐标转换和体素化融合 3)建立地质模型并进行围岩分级 4)对结果进行可视化展示和剖切分析"
expected_agents:
  - InitializationAgent
  - PreprocessingAgent
  - ModelingAgent
  - VisualizationAgent
expected_tool_sequence:
  # 初始化阶段 - 加载多源数据
  - tool: query_hierarchy
    params:
      level: project
  - tool: query_metadata
    params:
      mileage_range: [5000.0, 8000.0]
      data_type: "TSP"
  - tool: query_metadata
    params:
      mileage_range: [5000.0, 8000.0]
      data_type: "GPR"
  - tool: query_metadata
    params:
      mileage_range: [5000.0, 8000.0]
      data_type: "BOREHOLE"
  - tool: import_dataset
    params:
      dataset_id: 201
      dataset_type: "TSP"
  - tool: import_dataset
    params:
      dataset_id: 301
      dataset_type: "GPR"
  - tool: import_dataset
    params:
      dataset_id: 401
      dataset_type: "BOREHOLE"
  - tool: import_dataset
    params:
      dataset_id: 501
      dataset_type: "DEM"
  - tool: import_dataset
    params:
      dataset_id: 502
      dataset_type: "DOM"
  # 预处理阶段 - 坐标转换和体素化
  - tool: project_transform
    params:
      dataset_ids: [1001, 1002, 1003]
      transform_type: "mileage_to_spatial"
      centerline_id: 2001
  - tool: resample
    params:
      entity_ids: [3001, 3002, 3003, 3004]
      target_resolution: 2.0
      method: "cubic"
  - tool: voxelize
    params:
      entity_ids: [4001, 4002, 4003, 4004]
      bbox: [4900.0, -200.0, -150.0, 8100.0, 200.0, 50.0]
      resolution: 2.0
  # 建模阶段 - 地质建模和围岩分级
  - tool: model_geological_body
    params:
      rules:
        - body_type: horizontal_layer
          lithology: soil
          depth_top: 0
          depth_bottom: -8
        - body_type: horizontal_layer
          lithology: sandstone
          depth_top: -8
          depth_bottom: -35
        - body_type: horizontal_layer
          lithology: mudstone
          depth_top: -35
          depth_bottom: -65
        - body_type: horizontal_layer
          lithology: limestone
          depth_top: -65
          depth_bottom: -120
      bbox: [4900.0, -200.0, -130.0, 8100.0, 200.0, 10.0]
      resolution: 2.0
  - tool: interpolate_spatial
    params:
      control_points_id: 5001
      target_grid_id: 6001
      attribute: "Vp"
      method: "kriging"
  - tool: calculate_property
    params:
      voxel_grid_id: 6002
      formula: "RMR_calculation"
      output_attribute: "RMR_total"
  - tool: classify_indicator
    params:
      voxel_grid_id: 6003
      indicator_name: "RMR"
      grade_scheme: "RMR"
      attribute: "RMR_total"
  - tool: validate_model
    params:
      model_id: 6004
      drillhole_id: 5001
  # 可视化阶段 - 专业展示
  - tool: delaunay_triangulation
    params:
      raster_id: 7001
  - tool: apply_texture
    params:
      surface_entity_id: 8001
      dom_dataset_id: 7002
  - tool: create_view
    params:
      layout: "quad"
  - tool: import_entity
    params:
      entity_id: 8001
  - tool: import_entity
    params:
      entity_id: 8002
  - tool: set_voxel_slice
    params:
      entity_id: 8002
      slice_type: "longitudinal"
      mileage_range: [5000.0, 8000.0]
  - tool: set_standard_view
    params:
      view_id: 3
      direction: "isometric"
  - tool: focus_on_entity
    params:
      entity_ids: [8001, 8002]
  - tool: capture_view
    params:
      view_id: 3
      output_path: "output/3D_geological_model_final.png"
expected_final_state:
  success: true
