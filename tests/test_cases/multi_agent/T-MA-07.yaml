id: T-MA-07
name: "两阶段协同-里程段超前预报数据展示"
agent: multi_agent
level: L2
prompt: "找到里程DK5+128附近的TSP超前地质预报数据，加载后在可视化中展示并聚焦"
expected_agents:
  - InitializationAgent
  - VisualizationAgent
expected_tool_sequence:
  - tool: query_hierarchy
    params:
      level: work_site
      mileage_infos:
        - "DK5+128"
  - tool: query_metadata
    params:
      site_ids: ["S001"]
      data_type: "TSP"
  - tool: import_dataset
    params:
      dataset_path: "data/raw/tsp_dk5.csv"
      dataset_type: "TSP"
  - tool: focus_on_entity
    params:
      entity_ids: [1010]
expected_final_state:
  success: true
mock_responses:
  query_hierarchy:
    success: true
    data:
      - site_id: "S001"
        name: "进口段"
        mileage_prefix: "DK"
        start_mileage: 5000.0
        end_mileage: 5500.0
    message: "按里程查询到 1 个工点"
    metadata: {count: 1}
  query_metadata:
    success: true
    data:
      - dataset_id: "D010"
        name: "tsp_dk5.csv"
        data_type: "TSP"
        file_path: "data/raw/tsp_dk5.csv"
    message: "查询到 1 个数据集"
    metadata: {count: 1}
  import_dataset:
    success: true
    data: {entity_id: 1010}
    message: "成功加载 TSP 数据，实体 ID: 1010"
    metadata: {}
  focus_on_entity:
    success: true
    data: {entity_ids: [1010]}
    message: "相机聚焦完成"
    metadata: {}
