id: T-P-05
name: "L2-两步-洞内裁剪后空间采样（边界ID链式传递）"
agent: PreprocessingAgent
level: L2
prompt: "对DBH钻孔数据实体1015沿中线2001创建30米洞内缓冲区（里程5000-5500），然后对该数据在裁剪范围内按1米分辨率进行空间采样"

expected_tool_sequence:
  - tool: clip_to_boundary
    params:
      dataset_id: 1015
      centerline_id: 2001
      coverage_range: 30.0
      clip_mode: "tunnel"
      mileage_range: [5000.0, 5500.0]
  - tool: spatial_sample
    params:
      dataset_id: 1015
      resolution: 1.0
      boundary_entity_id: 4001

expected_final_state:
  success: true
  contains_field: data

mock_responses:
  clip_to_boundary:
    success: true
    data: {boundary_entity_id: 4001}
    file_path: null
    message: "洞内三维缓冲区裁剪完成，边界实体ID: 4001"
    metadata: {}
  spatial_sample:
    success: true
    data: {entity_id: 5001, sample_count: 980}
    file_path: null
    message: "空间采样完成，采样点数: 980，结果实体ID: 5001"
    metadata: {}
