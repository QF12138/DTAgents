id: T-P-13
name: "L3-长大隧道多数据源融合预处理（TSP+GPR+钻孔→统一体素网格）"
agent: PreprocessingAgent
level: L3
prompt: "对DK5+000至DK8+000里程段的多源探测数据进行完整预处理：先将TSP和GPR数据从里程坐标系转换为三维空间坐标，再对钻孔数据进行深度坐标转换，然后统一所有数据的分辨率至2米，最后进行体素化生成融合体素网格"
expected_tool_sequence:
  - tool: project_transform
    params:
      dataset_ids: [201, 202, 203]
      transform_type: "mileage_to_spatial"
      centerline_id: 1001
      profile_id: 1002
  - tool: project_transform
    params:
      dataset_ids: [301, 302, 303]
      transform_type: "mileage_to_spatial"
      centerline_id: 1001
  - tool: project_transform
    params:
      dataset_ids: [401, 402, 403, 404]
      transform_type: "borehole_to_3d"
      centerline_id: 1001
  - tool: resample
    params:
      entity_ids: [3001, 3002, 3003, 3004, 3005, 3006, 3007]
      target_resolution: 2.0
      method: "cubic"
  - tool: voxelize
    params:
      entity_ids: [5001, 5002, 5003, 5004, 5005, 5006, 5007]
      bbox: [4900.0, -200.0, -150.0, 8100.0, 200.0, 50.0]
      resolution: 2.0
