id: T-P-11
name: "L4-边界-未指定覆盖范围时应跳过clip_to_boundary"
agent: PreprocessingAgent
level: L4
prompt: "将DEM数据实体1001从EPSG:4326转换到工程坐标系EPSG:4547"
