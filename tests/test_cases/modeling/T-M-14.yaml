id: T-M-14
name: "L3-围岩分级智能建模（RMR+Q系统综合评级）"
agent: ModelingAgent
level: L3
prompt: "对融合体素网格进行围岩分级计算：先用波速计算初始RMR评分，再综合RQD和岩性计算Q值，最后根据RMR和Q值进行GSI修正，输出综合围岩分级体素网格"
expected_tool_sequence:
  - tool: calculate_property
    params:
      voxel_grid_id: 6001
      formula: "if(Vp >= 4500, 20, if(Vp >= 3500, 17, if(Vp >= 2500, 12, if(Vp >= 1500, 7, 2))))"
      output_attribute: "RMR_Vp"
  - tool: calculate_property
    params:
      voxel_grid_id: 6001
      formula: "if(RQD >= 90, 20, if(RQD >= 75, 15, if(RQD >= 50, 8, if(RQD >= 25, 3, 0))))"
      output_attribute: "RMR_RQD"
  - tool: calculate_property
    params:
      voxel_grid_id: 6001
      formula: "RMR_Vp + RMR_RQD + 10 + (-5 if(lithology in ['shale', 'mudstone']) else 0)"
      output_attribute: "RMR_total"
  - tool: classify_indicator
    params:
      voxel_grid_id: 6002
      indicator_name: "RMR"
      grade_scheme: "RMR"
      attribute: "RMR_total"
  - tool: calculate_property
    params:
      voxel_grid_id: 6001
      formula: "(RQD * Jr * Jw) / (Ja * Jn)"
      output_attribute: "Q_value"
      input_attributes:
        RQD: 5001
        Jr: 6003
        Jw: 6004
        Ja: 6005
        Jn: 6006
  - tool: classify_indicator
    params:
      voxel_grid_id: 6007
      indicator_name: "Q"
      grade_scheme: "Q"
      attribute: "Q_value"
  - tool: calculate_property
    params:
      voxel_grid_id: 6001
      formula: "min(RMR_total, (Q_value * 9 / Jn) + GSI_adjustment)"
      output_attribute: "GSI_composite"
  - tool: classify_indicator
    params:
      voxel_grid_id: 6008
      indicator_name: "GSI"
      grade_scheme: "GSI"
      attribute: "GSI_composite"
  - tool: validate_model
    params:
      model_id: 6009
      drillhole_id: 7001
      constraints:
        no_extreme_values: true
        layer_continuity: true
expected_final_state:
  success: true
  contains_field: data
