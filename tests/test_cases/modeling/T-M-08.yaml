id: T-M-08
name: "L3-三步-随机森林岩性分类后提取界面"
agent: ModelingAgent
level: L3
prompt: "基于钻孔训练数据（data/raw/drl_2024.csv）对体素网格（data/processed/feature_grid.npz）进行随机森林岩性分类，再提取分类值为1的岩性界面"
expected_tool_sequence:
  - tool: classify_lithology
    params:
      training_data_path: "data/raw/drl_2024.csv"
      model_type: "random_forest"
  - tool: extract_isosurface
    params:
      voxel_grid_path: "data/processed/lithology_rf.npz"
      attribute: "lithology"
      isovalue: 1.0
expected_final_state:
  success: true
  contains_field: data
mock_responses:
  classify_lithology:
    success: true
    data: {accuracy: 0.92, classes: ["砂岩", "泥岩", "灰岩"]}
    file_path: "data/processed/lithology_rf.npz"
    message: "岩性分类完成，准确率 92%"
    metadata: {}
  extract_isosurface:
    success: true
    data: {entity_id: 2015, vertex_count: 8000, face_count: 16000}
    message: "等值面提取完成，实体 ID: 2015"
    metadata: {}
