id: T-M-06
name: "L2-建立地质体模型并验证"
agent: ModelingAgent
level: L2
prompt: "根据地质规则建立砂岩岩层模型（深度-50m到-20m），然后验证模型的一致性"
expected_tool_sequence:
  - tool: model_geological_body
    params:
      rules:
        - body_type: "layer"
          lithology: "砂岩"
          depth_top: -20.0
          depth_bottom: -50.0
  - tool: validate_model
    params:
      model_path: "data/processed/geo_body.vtk"
expected_final_state:
  success: true
mock_responses:
  model_geological_body:
    success: true
    file_path: "data/processed/geo_body.vtk"
    message: "地质体建模完成"
    metadata: {}
  validate_model:
    success: true
    data: {is_valid: true, issues: []}
    message: "模型验证通过"
    metadata: {}
