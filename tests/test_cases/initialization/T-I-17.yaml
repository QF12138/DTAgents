id: T-I-17
name: "L2-查询整个隧道工程下的所有数据"
agent: InitializationAgent
level: L2
prompt: "查询某长大隧道工程下的所有工点及其包含的各类探测数据"
expected_tool_sequence:
  - tool: query_hierarchy
    params:
      level: project
  - tool: query_hierarchy
    params:
      level: work_site
      project_id: "P001"
  - tool: query_metadata
    params:
      project_id: "P001"
expected_final_state:
  success: true
  contains_field: data
mock_responses:
  query_hierarchy:
    success: true
    data:
      - project_id: "P001"
        name: "某长大隧道工程"
        type: tunnel
        location: "西南山区"
        total_length: 12580.0
    message: "查询到 1 个工程"
    metadata: {count: 1}
  query_hierarchy:
    success: true
    data:
      - site_id: "S001"
        name: "进口工点"
        mileage_prefix: "DK"
        start_mileage: 0.0
        end_mileage: 3200.0
        tunnel_length: 3200.0
      - site_id: "S002"
        name: "1号斜井工点"
        mileage_prefix: "DK"
        start_mileage: 2800.0
        end_mileage: 4200.0
        tunnel_length: 1400.0
      - site_id: "S003"
        name: "洞身工点1"
        mileage_prefix: "DK"
        start_mileage: 4200.0
        end_mileage: 6800.0
        tunnel_length: 2600.0
      - site_id: "S004"
        name: "2号斜井工点"
        mileage_prefix: "DK"
        start_mileage: 6200.0
        end_mileage: 7800.0
        tunnel_length: 1600.0
      - site_id: "S005"
        name: "洞身工点2"
        mileage_prefix: "DK"
        start_mileage: 7800.0
        end_mileage: 10500.0
        tunnel_length: 2700.0
      - site_id: "S006"
        name: "出口工点"
        mileage_prefix: "DK"
        start_mileage: 10500.0
        end_mileage: 12580.0
        tunnel_length: 2080.0
    message: "查询到 6 个工点"
    metadata: {count: 6}
  query_metadata:
    success: true
    data:
      # TSP数据
      - dataset_id: "D001"
        name: "TSP_进口段_0-3200m.dat"
        data_type: "TSP"
        file_path: "data/raw/tsp/TSP_import_0_3200.dat"
        start_mileage: 0.0
        end_mileage: 3200.0
        site_id: "S001"
        attributes: [P波速度, S波速度, 密度, 泊松比]
      - dataset_id: "D002"
        name: "TSP_洞身1_4200-6800m.dat"
        data_type: "TSP"
        file_path: "data/raw/tsp/TSP_mid1_4200_6800.dat"
        start_mileage: 4200.0
        end_mileage: 6800.0
        site_id: "S003"
        attributes: [P波速度, S波速度, 密度, 泊松比]
      - dataset_id: "D003"
        name: "TSP_洞身2_7800-10500m.dat"
        data_type: "TSP"
        file_path: "data/raw/tsp/TSP_mid2_7800_10500.dat"
