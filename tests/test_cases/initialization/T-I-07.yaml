id: T-I-07
name: "L2-两步顺序-工点+时间范围查钻孔数据"
agent: InitializationAgent
level: L2
prompt: "查询进口段工点2024年的钻孔勘探数据（DRL类型）"
expected_tool_sequence:
  - tool: query_hierarchy
    params:
      level: work_site
  - tool: query_metadata
    params:
      site_ids: ["S001"]
      time_range: ['2024-01-01', '2024-12-31']
      data_type: "DRL"
expected_final_state:
  success: true
  contains_field: data
mock_responses:
  query_hierarchy:
    success: true
    data:
      - site_id: "S001"
        name: "进口段"
        start_mileage: 5000.0
        end_mileage: 5500.0
    message: "查询到 1 个工点"
    metadata: {count: 1}
  query_metadata:
    success: true
    data:
      - dataset_id: "D003"
        name: "drl_2024.csv"
        data_type: "DRL"
        file_path: "data/raw/drl_2024.csv"
        survey_date_start: "2024-01-01"
        survey_date_end: "2024-12-31"
    message: "查询到 1 个数据集"
    metadata: {count: 1}
