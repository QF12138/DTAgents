id: T-I-04
name: "L1-按里程冠号查询工点"
agent: InitializationAgent
level: L1
prompt: "查询DK5+128至DK5+256里程区间对应的工点信息"
expected_tool_sequence:
  - tool: query_hierarchy
    params:
      level: work_site
      mileage_infos: ["DK5+128", "DK5+256"]
expected_final_state:
  success: true
  contains_field: data
mock_responses:
  query_hierarchy:
    success: true
    data:
      - site_id: "S001"
        name: "进口段"
        mileage_prefix: "DK"
        start_mileage: 5000.0
        end_mileage: 5500.0
    message: "按里程查询到 1 个工点，里程区间 mileage_range=[5128.0, 5256.0]"
    metadata: {count: 1}
