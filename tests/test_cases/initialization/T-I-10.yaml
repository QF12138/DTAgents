id: T-I-10
name: "L3-三步完整流程-里程段超前预报数据加载"
agent: InitializationAgent
level: L3
prompt: "加载里程DK5+128到DK5+256范围内的TSP超前地质预报数据"
expected_tool_sequence:
  - tool: query_hierarchy
    params:
      level: work_site
      mileage_infos: ["DK5+128", "DK5+256"]
  - tool: query_metadata
    params:
      site_ids: ["S001"]
      mileage_range: [5128.0, 5256.0]
      data_type: "TSP"
  - tool: import_dataset
    params:
      dataset_path: "data/raw/tsp_dk5.csv"
      dataset_type: "TSP"
expected_final_state:
  success: true
  contains_field: data
mock_responses:
  query_hierarchy:
    success: true
    data:
      - site_id: "S001"
        name: "进口段"
        mileage_prefix: "DK"
        start_mileage: 5000.0
        end_mileage: 5500.0
    message: "查询到 1 个工点，里程区间 mileage_range=[5128.0, 5256.0]"
    metadata: {count: 1}
  query_metadata:
    success: true
    data:
      - dataset_id: "D010"
        name: "tsp_dk5.csv"
        data_type: "TSP"
        file_path: "data/raw/tsp_dk5.csv"
        start_mileage: 5100.0
        end_mileage: 5256.0
    message: "查询到 1 个数据集"
    metadata: {count: 1}
  import_dataset:
    success: true
    data: {entity_id: 1010}
    message: "成功加载 TSP 数据，实体 ID: 1010"
    metadata: {}
