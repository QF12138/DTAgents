  query_metadata:
    success: true
    data:
      - dataset_id: "D001"
        name: "dem_2024.tif"
        data_type: "DEM"
        file_path: "data/raw/dem_2024.tif"
    message: "查询到 1 个数据集"
    metadata: {count: 1}
  import_dataset:
    success: true
    data: {entity_id: 1001}
    message: "成功加载 DEM 数据，实体 ID: 1001"
    metadata: {}
