id: T-I-09
name: "L3-三步完整流程-检索并加载DEM数据"
agent: InitializationAgent
level: L3
prompt: "检索示例隧道工程的DEM数字高程模型数据并加载到系统中"
expected_tool_sequence:
  - tool: query_hierarchy
    params:
      level: project
  - tool: query_metadata
    params:
      project_id: "P001"
      data_type: "DEM"
  - tool: import_dataset
    params:
      dataset_path: "data/raw/dem_2024.tif"
      dataset_type: "DEM"
