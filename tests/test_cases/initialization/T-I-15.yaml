id: T-I-15
name: "L4-边界-正确识别里程格式并查询"
agent: InitializationAgent
level: L4
prompt: "帮我查一下DK5+128这个位置附近的超前地质预报数据"
expected_tool_sequence:
  - tool: query_hierarchy
    params:
      level: work_site
      mileage_infos:
        - "DK5+128"
  - tool: query_metadata
    params:
      data_type: "TSP"
expected_final_state:
  success: true
  contains_field: data
# 测试点：agent 能从自然语言"DK5+128"识别出里程格式，
# 调用 query_hierarchy 时选择 mileage_infos 而非 project_id
mock_responses:
  query_hierarchy:
    success: true
    data:
      - site_id: "S001"
        name: "进口段"
        mileage_prefix: "DK"
        start_mileage: 5000.0
        end_mileage: 5500.0
    message: "按里程查询到 1 个工点"
    metadata: {count: 1}
  query_metadata:
    success: true
    data:
      - dataset_id: "D010"
        name: "tsp_dk5.csv"
        data_type: "TSP"
        file_path: "data/raw/tsp_dk5.csv"
    message: "查询到 1 个数据集"
    metadata: {count: 1}
