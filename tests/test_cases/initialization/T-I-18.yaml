id: T-I-18
name: "L2-多数据源联合查询（GPR+TSP+钻孔）"
agent: InitializationAgent
level: L2
prompt: "查询DK5+000至DK5+800里程范围内的GPR雷达数据、TSP超前预报数据和钻孔数据"
expected_tool_sequence:
  - tool: query_hierarchy
    params:
      level: work_site
      mileage_infos: ["DK5+000", "DK5+800"]
  - tool: query_metadata
    params:
      mileage_range: [5000.0, 5800.0]
      data_type: "GPR"
  - tool: query_metadata
    params:
      mileage_range: [5000.0, 5800.0]
      data_type: "TSP"
  - tool: query_metadata
    params:
      mileage_range: [5000.0, 5800.0]
      data_type: "BOREHOLE"
expected_final_state:
  success: true
  contains_field: data
mock_responses:
  query_hierarchy:
    success: true
    data:
      - site_id: "S003"
        name: "洞身工点1"
        mileage_prefix: "DK"
        start_mileage: 4200.0
        end_mileage: 6800.0
      - site_id: "S005"
        name: "洞身工点2"
        mileage_prefix: "DK"
        start_mileage: 7800.0
        end_mileage: 10500.0
    message: "查询到 2 个工点与目标里程区间重叠"
    metadata: {count: 2, overlap_sites: [S003, S005]}
  query_metadata:
    success: true
